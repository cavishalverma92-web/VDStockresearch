services:
  - type: web
    name: indian-stock-research-platform
    runtime: python
    plan: free
    region: singapore
    branch: main
    autoDeployTrigger: commit
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt && pip install -e .
    startCommand: bash -lc 'python -m streamlit run src/stock_platform/ui/streamlit_app.py --server.address 0.0.0.0 --server.port "$PORT" --server.headless true --server.enableCORS false --server.enableXsrfProtection false --server.fileWatcherType none --browser.gatherUsageStats false'
    healthCheckPath: /_stcore/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.10
      - key: APP_ENV
        value: production
      - key: APP_LOG_LEVEL
        value: INFO
      - key: APP_TIMEZONE
        value: Asia/Kolkata
      - key: DATABASE_URL
        value: sqlite:///data/stock_platform.db
      - key: CACHE_DIR
        value: data/cache
      - key: RAW_DIR
        value: data/raw
      - key: PROCESSED_DIR
        value: data/processed
      - key: MARKET_DATA_PROVIDER
        value: auto
      - key: PROVIDER_PRICE
        value: yfinance
      - key: ENABLE_KITE_MARKET_DATA
        value: true
      - key: ENABLE_KITE_TRADING
        value: false
      - key: ENABLE_KITE_PORTFOLIO
        value: false
      - key: KITE_API_KEY
        sync: false
      - key: KITE_API_SECRET
        sync: false
      - key: KITE_ACCESS_TOKEN
        sync: false
