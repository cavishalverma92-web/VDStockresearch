# -----------------------------------------------------------------------------
# Universe definitions for the Phase 8 scanner
# -----------------------------------------------------------------------------
# Each list is a curated set of NSE tickers (with .NS suffix) used by
# `analytics.scanner.universe_scanner`.
#
# IMPORTANT: index constituents change quarterly. These are seed watchlists,
# not a legally verified current index file. Update these lists from
# https://archives.nseindia.com/content/indices/ind_nifty50list.csv
# and similar URLs before treating them as official index membership.
# -----------------------------------------------------------------------------

version: 1

# CSV-backed universes are read from local files. We intentionally do not commit
# full exchange master files because listings change and source terms should be
# reviewed before redistribution.
csv_universes:
  all_nse_listed:
    path: data/universe/nse_equity_list.csv
    symbol_column: SYMBOL
    series_column: SERIES
    series_value: EQ
    source: NSE EQUITY_L.csv
    notes: "Run scripts/update_nse_universe.ps1 to download the official NSE equity list locally."

